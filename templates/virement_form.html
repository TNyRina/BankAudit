{% extends 'base.html' %}
{% block title %}{{ action }} virement{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="fa fa-right-left me-2 text-primary"></i>{{ action }} un virement</h2>
</div>

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><h6><i class="fa fa-file-invoice-dollar me-2"></i>Formulaire virement</h6></div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Compte client</label>
            <select name="n_compte" class="form-select" required {% if virement %}disabled{% endif %}>
              {% for c in clients %}
              <option value="{{ c.n_compte }}"
                {% if virement and virement.n_compte == c.n_compte %}selected{% endif %}>
                {{ c.n_compte }} — {{ c.nomclient }} (solde: {{ "%.2f"|format(c.solde) }} Ar)
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Montant (Ar)</label>
            <input type="number" name="montant" step="0.01" class="form-control"
                   value="{{ virement.montant if virement else '' }}"
                   placeholder="Positif = crédit, négatif = débit" required>
            <div class="form-text">Le solde sera recalculé via trigger : Nouveau solde = Ancien solde + Montant</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Date du virement</label>
            <input type="date" name="date_virement" class="form-control"
                   value="{{ virement.date_virement if virement else '' }}" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fa fa-save me-2"></i>{{ action }}
            </button>
            <a href="{{ url_for('bp_virement.virements') }}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
